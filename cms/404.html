<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background: #f4f6f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .error-code {
      font-size: 120px;
      font-weight: bold;
      color: #2c3e50;
      margin: 0;
      animation: bounce 2s ease infinite;
    }

    .error-message {
      font-size: 24px;
      color: #34495e;
      margin: 20px 0;
    }

    .error-description {
      color: #7f8c8d;
      margin-bottom: 30px;
    }

    .home-button {
      display: inline-block;
      padding: 12px 30px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .home-button:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }

    @keyframes bounce {

      0%,
      20%,
      50%,
      80%,
      100% {
        transform: translateY(0);
      }

      40% {
        transform: translateY(-30px);
      }

      60% {
        transform: translateY(-15px);
      }
    }
  </style>
</head>

<body>
  <div class="error-container">
    <h1 class="error-code">404</h1>
    <h2 class="error-message">Oops! Page Not Found</h2>
    <p class="error-description">
      The page you're looking for seems to have wandered off.
      Don't worry, even the best of us get lost sometimes!
    </p>
    <a href="./" class="home-button">Return to Dashboard</a>
  </div>
</body>

</html>
